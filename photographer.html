    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
.fireflies {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none; 
    overflow: hidden;
}


.firefly {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: rgba(255, 255, 0, 0.8);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255, 255, 0, 0.8);
    animation: move 5s linear infinite, blink 2s ease-in-out infinite;
}


@keyframes move {
    0% {
        transform: translate(0, 0);
    }
    25% {
        transform: translate(50vw, 20vh);
    }
    50% {
        transform: translate(-30vw, 50vh);
    }
    75% {
        transform: translate(40vw, -20vh);
    }
    100% {
        transform: translate(0, 0);
    }
}


@keyframes blink {
    0%, 100% {
        opacity: 0.8;
    }
    50% {
        opacity: 0.2;
    }
}

body::-webkit-scrollbar{
    display: none;
}


.firefly:nth-child(1) {
    top: 10%;
    left: 20%;
    animation-delay: 0s, 0.5s;
}
.firefly:nth-child(2) {
    top: 30%;
    left: 50%;
    animation-delay: 1s, 1s;
}
.firefly:nth-child(3) {
    top: 50%;
    left: 70%;
    animation-delay: 2s, 1.5s;
}
.firefly:nth-child(4) {
    top: 70%;
    left: 30%;
    animation-delay: 3s, 2s;
}
.firefly:nth-child(5) {
    top: 90%;
    left: 80%;
    animation-delay: 4s, 2.5s;
}
.firefly:nth-child(6) {
    top: 20%;
    left: 60%;
    animation-delay: 1.5s, 1s;
}
.firefly:nth-child(7) {
    top: 40%;
    left: 10%;
    animation-delay: 2.5s, 1.5s;
}
.firefly:nth-child(8) {
    top: 60%;
    left: 40%;
    animation-delay: 3.5s, 2s;
}
.firefly:nth-child(9) {
    top: 80%;
    left: 20%;
    animation-delay: 4.5s, 2.5s;
}
.firefly:nth-child(10) {
    top: 10%;
    left: 90%;
    animation-delay: 5s, 3s;
}

.image-zoom {
    transform: scale(0.8);
    opacity: 0;
    transition: transform 0.5s ease, opacity 0.5s ease;
}

.image-zoom.visible {
    transform: scale(1);
    opacity: 1;
}
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const images = document.querySelectorAll('.image-zoom');
    
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target); 
                    }
                });
            });
    
            images.forEach(image => {
                observer.observe(image);
            });
        });
    </script>
